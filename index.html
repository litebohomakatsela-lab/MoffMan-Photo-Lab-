<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoffMan Photo Lab</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- NAVIGATION -->
  <header>
    <div class="logo">MoffMan Photo Lab</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- HERO / BACKGROUND SECTION -->
  <section class="hero">
    <div class="hero-text">
      <h1>Welcome to MoffMan Photo Lab</h1>
      <p>We enlarge, print, copy, laminate & capture your memories</p>
    </div>
  </section>

  <!-- GALLERY / WORK SHOWCASE -->
  <section class="gallery">
    <h2>Our Work & Prices</h2>

    <div class="grid">

      <div class="card">
        <img src="images/print.jpg" class="bw-filter" />
        <h3>Photo Printing</h3>
        <p>From M50</p>
      </div>

      <div class="card">
        <img src="images/laminating.jpg" class="bw-filter" />
        <h3>Laminating</h3>
        <p>From M30</p>
      </div>

      <div class="card">
        <img src="images/frames.jpg" class="bw-filter" />
        <h3>Photo Frames</h3>
        <p>From M100</p>
      </div>

      <div class="card">
        <img src="images/video.jpg" class="bw-filter" />
        <h3>Video Capture</h3>
        <p>From M200</p>
      </div>

    </div>
  </section>

  <footer>
    <p>© 2026 MoffMan Photo Lab</p>
  </footer>

</body>
</html>
